<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Giacenza Jaluna</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --teal: #4DD0C4; --teal-dim: rgba(77,208,196,0.12);
    --red: #ef4444; --red-dim: rgba(239,68,68,0.15);
    --green: #22c55e; --green-dim: rgba(34,197,94,0.15);
    --white: #f0f0f0; --muted: #666; --border: #2a2a2a; --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--white); font-family: 'DM Mono', monospace; min-height: 100vh; padding-bottom: 100px; }

  /* Header */
  header { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); padding: 14px 20px 10px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--teal); letter-spacing: -0.5px; }
  .date-badge { font-size: 11px; color: var(--muted); background: var(--surface2); border-radius: 20px; padding: 4px 10px; }
  .alert-banner { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--red); display: none; align-items: center; gap: 6px; }
  .alert-banner.show { display: flex; }

  /* Tabs */
  .tabs { display: flex; gap: 6px; overflow-x: auto; padding: 12px 20px 0; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .tab.active { background: var(--teal); color: #000; border-color: var(--teal); font-weight: 600; }
  .tab .badge { display: inline-block; background: var(--red); color: #fff; border-radius: 10px; padding: 1px 6px; font-size: 10px; margin-left: 4px; }

  /* Section */
  .section { display: none; padding: 14px 20px; }
  .section.active { display: block; }
  .section-label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--teal); text-transform: uppercase; margin: 18px 0 8px; padding-left: 4px; }
  .section-label:first-child { margin-top: 4px; }

  /* Product card */
  .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; position: relative; overflow: hidden; }
  .product-card.low { border-color: rgba(239,68,68,0.5); background: var(--red-dim); }
  .product-card.low::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--red); }
  .product-card.ok::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--teal); }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-size: 13px; font-weight: 500; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .product-meta { font-size: 11px; color: var(--muted); }
  .product-meta .low-text { color: var(--red); }
  .product-meta .ok-text { color: var(--teal); }

  /* Qty controls */
  .qty-control { display: flex; align-items: center; background: var(--surface2); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; flex-shrink: 0; }
  .qty-btn { width: 34px; height: 34px; background: transparent; border: none; color: var(--teal); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; user-select: none; }
  .qty-btn:active { background: var(--teal-dim); }
  .qty-display { min-width: 30px; text-align: center; font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--white); padding: 0 4px; }
  .qty-display.zero { color: var(--red); }
  .toggle-btn { width: 52px; height: 34px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .toggle-btn:active { transform: scale(0.93); }
  .toggle-btn.is-ok { background: rgba(77,208,196,0.1); border-color: rgba(77,208,196,0.4); }
  .toggle-btn.is-no { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.4); }

  /* Ordinare */
  .ordinare-card { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .ordinare-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
  .ordinare-info { flex: 1; }
  .ordinare-name { font-size: 13px; color: var(--white); margin-bottom: 2px; }
  .ordinare-detail { font-size: 11px; color: var(--red); }

  /* ── MOVIMENTI ── */
  .mov-header { padding: 14px 20px 0; }
  .mov-filter-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; scrollbar-width: none; }
  .mov-filter-row::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 5px 12px; border-radius: 16px; font-family: 'DM Mono', monospace; font-size: 11px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .filter-btn.active { border-color: var(--teal); color: var(--teal); background: var(--teal-dim); }

  /* Form movimento */
  .mov-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin: 0 20px 16px; }
  .mov-form-title { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; color: var(--teal); text-transform: uppercase; margin-bottom: 12px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .form-select, .form-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--white); font-family: 'DM Mono', monospace;
    font-size: 12px; padding: 9px 10px; outline: none;
    -webkit-appearance: none; appearance: none;
  }
  .form-select:focus, .form-input:focus { border-color: var(--teal); }
  .form-select option { background: var(--surface2); }
  .type-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .type-btn {
    flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface2); font-family: 'DM Mono', monospace; font-size: 13px;
    cursor: pointer; transition: all 0.2s; color: var(--muted); font-weight: 500;
  }
  .type-btn.carico.sel { background: var(--red-dim); border-color: rgba(239,68,68,0.5); color: var(--red); }
  .type-btn.scarico.sel { background: var(--green-dim); border-color: rgba(34,197,94,0.5); color: var(--green); }
  .submit-btn {
    width: 100%; padding: 11px; border-radius: 10px; border: none;
    background: var(--teal); color: #000; font-family: 'DM Mono', monospace;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
  }
  .submit-btn:active { opacity: 0.8; }

  /* Lista movimenti */
  .mov-list { padding: 0 20px; }
  .mov-day-header {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 1.5px; color: var(--teal); text-transform: uppercase;
    margin: 18px 0 8px; padding-left: 2px;
  }
  .mov-day-header:first-child { margin-top: 0; }
  .mov-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 14px; margin-bottom: 7px; display: flex; align-items: center; gap: 10px; }
  .mov-card.carico { border-left: 3px solid var(--red); }
  .mov-card.scarico { border-left: 3px solid var(--green); }
  .mov-icon { font-size: 18px; flex-shrink: 0; }
  .mov-info { flex: 1; min-width: 0; }
  .mov-name { font-size: 13px; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mov-detail { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .mov-qty { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; flex-shrink: 0; }
  .mov-qty.carico { color: var(--red); }
  .mov-qty.scarico { color: var(--green); }
  .mov-time { font-size: 10px; color: var(--muted); flex-shrink: 0; }

  /* History toggle */
  .history-toggle { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; margin: 8px 20px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; font-size: 12px; color: var(--muted); cursor: pointer; }
  .history-toggle:active { background: var(--teal-dim); color: var(--teal); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; line-height: 1.8; }
  .empty-state .icon { font-size: 36px; margin-bottom: 10px; }
  .clear-btn { display: block; width: calc(100% - 40px); margin: 8px 20px; padding: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; text-align: center; }
  .clear-btn:active { background: var(--red-dim); color: var(--red); border-color: var(--red); }

  /* Nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; padding: 8px 0 18px; }
  .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; padding: 5px 10px; border-radius: 8px; transition: color 0.2s; }
  .nav-btn.active { color: var(--teal); }
  .nav-icon { font-size: 20px; }

  .toast { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--teal); color: var(--teal); padding: 9px 18px; border-radius: 20px; font-size: 12px; opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">JALUNA</div>
    <div class="date-badge" id="dateLabel"></div>
  </div>
  <div class="alert-banner" id="alertBanner">
    <span>⚠️</span><span id="alertText"></span>
  </div>
</header>

<div class="tabs" id="tabBar"></div>
<div id="sections"></div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showMainView()" id="navInventario">
    <span class="nav-icon">📦</span><span>Inventario</span>
  </button>
  <button class="nav-btn" onclick="showMovimenti()" id="navMovimenti">
    <span class="nav-icon">↕️</span><span>Movimenti</span>
  </button>
  <button class="nav-btn" onclick="showOrdinare()" id="navOrdinare">
    <span class="nav-icon">🛒</span><span>Da ordinare</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ── Toggle items ──────────────────────────────────────────────────────────
const TOGGLE_ITEMS = new Set([
  "Formaggi per taglieri","Gorgonzola","Mortadella","Noci","Pesto","Prosciutto","Pomodori secchi",
  "Pancake","Tagliata di Pollo","Tortini al Cioccolato",
  "Arancia","Lime","Limoni","Menta"
]);

const ALL_CATS = ["Frigo","Freezer","Vini","Cocktail"];

// ── Dati ──────────────────────────────────────────────────────────────────
const DATA = {
  "Frigo": { icon: "🥗", items: [
    { name: "Alici",                 qty: null, min: 1 },
    { name: "Cacio pepe",            qty: 5,    min: 0 },
    { name: "Carbonara",             qty: 5,    min: 0 },
    { name: "Ceci",                  qty: 8,    min: 3 },
    { name: "Fighi",                 qty: 3,    min: 1 },
    { name: "Formaggi per taglieri", qty: "✅",  min: null },
    { name: "Gorgonzola",            qty: "✅",  min: null },
    { name: "Mela catogna",          qty: 1,    min: 1 },
    { name: "Miele",                 qty: 1,    min: 1 },
    { name: "Mortadella",            qty: "✅",  min: null },
    { name: "Noci",                  qty: "✅",  min: null },
    { name: "Pesto",                 qty: "✅",  min: 1 },
    { name: "Piadine",               qty: 8,    min: 2 },
    { name: "Pomodori secchi",       qty: "✅",  min: null },
    { name: "Pomodorini",            qty: 2,    min: null },
    { name: "Prosciutto",            qty: "✅",  min: null },
    { name: "Rucola",                qty: 3,    min: 1 },
    { name: "Salsa avocado",         qty: 1,    min: 1 },
    { name: "Uova",                  qty: 7,    min: 4 },
  ]},
  "Freezer": { icon: "🧊", items: [
    { name: "Lasagne",               qty: null, min: null },
    { name: "Pancake",               qty: "✅",  min: null },
    { name: "Parmigiana",            qty: 1,    min: null },
    { name: "Polpette Pomodoro",     qty: 7,    min: null },
    { name: "Ravioli Sugo",          qty: 2,    min: null },
    { name: "Tagliata di Pollo",     qty: "✅",  min: null },
    { name: "Tonnarelli C&P",        qty: 4,    min: null },
    { name: "Tortini al Cioccolato", qty: "✅",  min: null },
  ]},
  "Vini": { icon: "🍷", groups: [
    { label: "VINI BIANCHI", items: [
      { name: "Arneis",                        qty: 17,   min: 4 },
      { name: "Bianco Bianco",                 qty: null, min: 4 },
      { name: "Chardonnay",                    qty: 26,   min: 4 },
      { name: "Fratus Franciacorta Brut",      qty: 13,   min: 4 },
      { name: "Fratus Franciacorta Brut Rosè", qty: 3,    min: 4 },
      { name: "Gewürztraminer",                qty: 7,    min: 4 },
      { name: "Pinot Grigio",                  qty: 18,   min: 4 },
      { name: "Ribolla Gialla",                qty: 14,   min: 4 },
      { name: "Sauvignon",                     qty: 16,   min: 4 },
      { name: "Vermentino",                    qty: 24,   min: 4 },
    ]},
    { label: "VINI ROSSI", items: [
      { name: "'Nterra",          qty: 6,    min: 4 },
      { name: "Chianti Classico", qty: 6,    min: 4 },
      { name: "Chianti Riserva",  qty: 3,    min: 4 },
      { name: "Mandus",           qty: 7,    min: 4 },
      { name: "Nebbiolo",         qty: null, min: 4 },
      { name: "Sasyr",            qty: 10,   min: 4 },
    ]},
  ]},
  "Cocktail": { icon: "🍸", groups: [
    { label: "SUPERALCOLICI", items: [
      { name: "Amaretto",         qty: null, min: 1 },
      { name: "Aperol",           qty: 44,   min: 5 },
      { name: "Campari",          qty: 0,    min: 3 },
      { name: "Gin",              qty: 8,    min: 2 },
      { name: "Hugo - Italicus",  qty: 0,    min: 2 },
      { name: "Limoncè",          qty: 11,   min: 3 },
      { name: "Rum",              qty: 0,    min: 2 },
      { name: "Tequila",          qty: 1,    min: 2 },
      { name: "Tequila Reposado", qty: 1,    min: 2 },
      { name: "Vodka",            qty: 1,    min: 3 },
      { name: "Whiskey Bourbon",  qty: 0,    min: 2 },
      { name: "Whiskey Rye",      qty: 1,    min: 2 },
    ]},
    { label: "AGRUMI & FRESCO", items: [
      { name: "Arancia", qty: "✅", min: null },
      { name: "Lime",    qty: "✅", min: null },
      { name: "Limoni",  qty: "✅", min: null },
      { name: "Menta",   qty: "✅", min: null },
    ]},
  ]},
};

// ── Helpers ───────────────────────────────────────────────────────────────
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDateLabel(key) {
  const [y,m,d] = key.split('-').map(Number);
  const date = new Date(y, m-1, d);
  if (key === todayKey()) return 'OGGI';
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yKey = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
  if (key === yKey) return 'IERI';
  return date.toLocaleDateString('it-IT', { weekday:'short', day:'numeric', month:'short' }).toUpperCase();
}
function safeId(s) { return s.replace(/[\s&'.]/g,'-'); }
function getAllItems(cat) {
  return DATA[cat].items || DATA[cat].groups?.flatMap(g=>g.items) || [];
}

// ── Storage sicuro (funziona anche su Safari con file locali) ─────────────
const _store = {};
function storageGet(k) { try { return localStorage.getItem(k); } catch(e) { return _store[k]||null; } }
function storageSet(k,v) { try { localStorage.setItem(k,v); } catch(e) { _store[k]=v; } }

// ── State ──────────────────────────────────────────────────────────────────
let state = JSON.parse(storageGet('jaluna_state') || 'null');
let movimenti = JSON.parse(storageGet('jaluna_movimenti') || '{}');

if (!state) {
  state = {};
  for (const [cat, catData] of Object.entries(DATA)) {
    state[cat] = {};
    const items = getAllItems(cat);
    for (const item of items) state[cat][item.name] = { qty: item.qty, min: item.min };
  }
  saveState();
} else {
  // migrazione toggle
  for (const cat of Object.keys(DATA)) {
    if (!state[cat]) continue;
    for (const name of TOGGLE_ITEMS) {
      if (state[cat][name] && typeof state[cat][name].qty === 'number')
        state[cat][name].qty = "✅";
    }
  }
  saveState();
}

function saveState() { storageSet('jaluna_state', JSON.stringify(state)); }
function saveMov() { storageSet('jaluna_movimenti', JSON.stringify(movimenti)); }
function getItem(cat, name) { return state[cat]?.[name] || {}; }

function isLow(cat, name) {
  const { qty, min } = getItem(cat, name);
  if (qty === "❌") return true;
  if (TOGGLE_ITEMS.has(name) || qty === null || min === null || min === 0) return false;
  if (typeof qty !== 'number') return false;
  return qty <= min;
}

// ── Render principale ──────────────────────────────────────────────────────
let currentTab = "Frigo";
let currentView = "main";

function renderAll() { renderDate(); renderTabs(); renderSections(); updateAlertBanner(); }

function renderDate() {
  const d = new Date();
  document.getElementById('dateLabel').textContent =
    d.toLocaleDateString('it-IT', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
  clearTimeout(renderDate._t);
  renderDate._t = setTimeout(renderDate, 60000 - (Date.now() % 60000));
}

function renderTabs() {
  if (currentView !== 'main') return;
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  for (const [cat, catData] of Object.entries(DATA)) {
    const lowCount = countLow(cat);
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === currentTab ? ' active' : '');
    btn.innerHTML = `${catData.icon} ${cat}` + (lowCount > 0 ? `<span class="badge">${lowCount}</span>` : '');
    btn.onclick = () => { currentTab = cat; renderTabs(); renderSections(); };
    bar.appendChild(btn);
  }
}

function countLow(cat) { return getAllItems(cat).filter(i => isLow(cat, i.name)).length; }
function countAllLow() { return Object.keys(DATA).reduce((a,c) => a + countLow(c), 0); }

function renderSections() {
  const container = document.getElementById('sections');
  container.innerHTML = '';
  if (currentView !== 'main') return;
  const sec = document.createElement('div'); sec.className = 'section active';
  const catData = DATA[currentTab];
  if (catData.items) {
    renderItemList(sec, currentTab, catData.items);
  } else if (catData.groups) {
    for (const group of catData.groups) {
      const lbl = document.createElement('div'); lbl.className = 'section-label';
      lbl.textContent = group.label; sec.appendChild(lbl);
      renderItemList(sec, currentTab, group.items);
    }
  }
  container.appendChild(sec);
}

function renderItemList(container, cat, items) {
  for (const item of items) container.appendChild(buildCard(cat, item.name));
}

function buildCard(cat, name) {
  const item = getItem(cat, name);
  const qty = item.qty; const min = item.min;
  const low = isLow(cat, name);
  const isToggle = TOGGLE_ITEMS.has(name);

  const card = document.createElement('div');
  card.className = 'product-card' + (low ? ' low' : (qty !== null && qty !== undefined ? ' ok' : ''));
  card.id = `card-${safeId(cat)}-${safeId(name)}`;

  const info = document.createElement('div'); info.className = 'product-info';
  const nameEl = document.createElement('div'); nameEl.className = 'product-name'; nameEl.textContent = name;
  info.appendChild(nameEl);
  if (min !== null && min !== undefined && min > 0) {
    const meta = document.createElement('div'); meta.className = 'product-meta';
    meta.innerHTML = low ? `<span class="low-text">⚠ min: ${min}</span>` : `<span class="ok-text">min: ${min}</span>`;
    info.appendChild(meta);
  }
  card.appendChild(info);

  if (isToggle) {
    const isOk = (qty === "✅" || qty === null);
    const btn = document.createElement('button');
    btn.className = 'toggle-btn ' + (isOk ? 'is-ok' : 'is-no');
    btn.id = `qty-${safeId(cat)}-${safeId(name)}`;
    btn.textContent = isOk ? '✅' : '❌';
    btn.onclick = () => toggleCheck(cat, name);
    card.appendChild(btn);
  } else {
    const ctrl = document.createElement('div'); ctrl.className = 'qty-control';
    const bm = document.createElement('button'); bm.className = 'qty-btn'; bm.textContent = '−'; bm.onclick = () => changeQty(cat, name, -1);
    const disp = document.createElement('div');
    disp.className = 'qty-display' + (qty === 0 ? ' zero' : '');
    disp.id = `qty-${safeId(cat)}-${safeId(name)}`;
    disp.textContent = qty === null ? '—' : qty;
    const bp = document.createElement('button'); bp.className = 'qty-btn'; bp.textContent = '+'; bp.onclick = () => changeQty(cat, name, +1);
    ctrl.appendChild(bm); ctrl.appendChild(disp); ctrl.appendChild(bp);
    card.appendChild(ctrl);
  }
  return card;
}

// ── Azioni inventario ─────────────────────────────────────────────────────
function toggleCheck(cat, name) {
  const item = state[cat][name];
  const wasOk = (item.qty === "✅" || item.qty === null);
  item.qty = wasOk ? "❌" : "✅";
  saveState();
  logMovimento(cat, name, wasOk ? 'carico' : 'scarico', wasOk ? -1 : 1, true);
  refreshCard(cat, name);
  updateAlertBanner(); renderTabs();
}

function changeQty(cat, name, delta) {
  const item = state[cat][name];
  if (TOGGLE_ITEMS.has(name)) return;
  let qty = typeof item.qty === 'number' ? item.qty : 0;
  qty = Math.max(0, qty + delta);
  state[cat][name].qty = qty;
  saveState();
  // carico(-) = delta<0, scarico(+) = delta>0
  logMovimento(cat, name, delta < 0 ? 'carico' : 'scarico', delta, false);
  const key = `${safeId(cat)}-${safeId(name)}`;
  const disp = document.getElementById(`qty-${key}`);
  const card = document.getElementById(`card-${key}`);
  if (disp) { disp.textContent = qty; disp.className = 'qty-display' + (qty === 0 ? ' zero' : ''); }
  const low = isLow(cat, name);
  if (card) card.className = 'product-card' + (low ? ' low' : ' ok');
  updateAlertBanner(); renderTabs();
  if (low) showToast(`⚠️ ${name} sotto scorta minima!`);
}

function refreshCard(cat, name) {
  const item = getItem(cat, name);
  const low = isLow(cat, name);
  const key = `${safeId(cat)}-${safeId(name)}`;
  const btn = document.getElementById(`qty-${key}`);
  const card = document.getElementById(`card-${key}`);
  if (btn && TOGGLE_ITEMS.has(name)) {
    btn.textContent = item.qty; btn.className = 'toggle-btn ' + (item.qty === "✅" ? 'is-ok' : 'is-no');
  }
  if (card) card.className = 'product-card' + (low ? ' low' : ' ok');
}

// ── Movimenti log ─────────────────────────────────────────────────────────
function logMovimento(cat, name, tipo, qty, isToggle) {
  const key = todayKey();
  if (!movimenti[key]) movimenti[key] = [];
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  movimenti[key].unshift({ cat, name, tipo, qty: isToggle ? tipo : Math.abs(qty), time, isToggle });
  saveMov();
}

function updateAlertBanner() {
  const count = countAllLow();
  const banner = document.getElementById('alertBanner');
  const text = document.getElementById('alertText');
  if (count > 0) { banner.classList.add('show'); text.textContent = `${count} prodott${count>1?'i':'o'} sotto scorta`; }
  else banner.classList.remove('show');
}

// ── Vista Movimenti ───────────────────────────────────────────────────────
let movFilterCat = 'Tutti';
let movFilterTipo = 'Tutti';
let showHistory = false;

function showMovimenti() {
  currentView = 'movimenti';
  setNav('navMovimenti');
  document.getElementById('tabBar').innerHTML = '';
  document.getElementById('tabBar').style.display = 'none';
  renderMovimentiView();
}

function renderMovimentiView() {
  const container = document.getElementById('sections');
  container.innerHTML = '';

  // Form aggiunta manuale
  const formDiv = document.createElement('div');
  formDiv.className = 'mov-form';
  formDiv.innerHTML = `
    <div class="mov-form-title">NUOVO MOVIMENTO</div>
    <div class="type-row">
      <button class="type-btn carico ${movFilterTipo==='carico'?'sel':''}" id="btnCarico" onclick="selectTipo('carico')">
        − CARICO
      </button>
      <button class="type-btn scarico ${movFilterTipo==='scarico'?'sel':''}" id="btnScarico" onclick="selectTipo('scarico')">
        + SCARICO
      </button>
    </div>
    <div class="form-row">
      <select class="form-select" id="movCatSel" onchange="updateProdSelect()">
        ${ALL_CATS.map(c => `<option value="${c}" ${c===movFilterCat&&movFilterCat!=='Tutti'?'selected':''}>${DATA[c].icon} ${c}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <select class="form-select" id="movProdSel"></select>
      <input class="form-input" id="movQty" type="number" min="1" value="1" style="max-width:70px">
    </div>
    <button class="submit-btn" onclick="submitMovimento()">Registra</button>
  `;
  container.appendChild(formDiv);
  updateProdSelect();

  // Filtri categoria
  const filterDiv = document.createElement('div');
  filterDiv.className = 'mov-header';
  const filterRow = document.createElement('div');
  filterRow.className = 'mov-filter-row';
  ['Tutti', ...ALL_CATS].forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (movFilterCat === c ? ' active' : '');
    btn.textContent = c === 'Tutti' ? 'Tutte le categorie' : `${DATA[c].icon} ${c}`;
    btn.onclick = () => { movFilterCat = c; renderMovimentiView(); };
    filterRow.appendChild(btn);
  });
  filterDiv.appendChild(filterRow);
  container.appendChild(filterDiv);

  // Lista movimenti di oggi
  const listDiv = document.createElement('div');
  listDiv.className = 'mov-list';

  const todayMov = (movimenti[todayKey()] || []).filter(m =>
    (movFilterCat === 'Tutti' || m.cat === movFilterCat)
  );

  if (todayMov.length === 0) {
    listDiv.innerHTML = '<div class="empty-state"><div class="icon">↕️</div>Nessun movimento oggi.<br>Usa il form sopra o<br>i +/- dall\'inventario.</div>';
  } else {
    const lbl = document.createElement('div'); lbl.className = 'mov-day-header';
    lbl.textContent = `OGGI (${todayMov.length})`;
    listDiv.appendChild(lbl);
    todayMov.forEach(m => listDiv.appendChild(buildMovCard(m)));
  }

  // Storico giorni precedenti
  const histBtn = document.createElement('button');
  histBtn.className = 'history-toggle';
  histBtn.innerHTML = showHistory ? '▲ Nascondi storico' : '▼ Mostra storico giorni precedenti';
  histBtn.onclick = () => { showHistory = !showHistory; renderMovimentiView(); };
  listDiv.appendChild(histBtn);

  if (showHistory) {
    const pastKeys = Object.keys(movimenti)
      .filter(k => k !== todayKey())
      .sort((a,b) => b.localeCompare(a));

    if (pastKeys.length === 0) {
      const noHist = document.createElement('div'); noHist.className = 'empty-state';
      noHist.style.paddingTop = '16px';
      noHist.textContent = 'Nessuno storico precedente.';
      listDiv.appendChild(noHist);
    } else {
      pastKeys.forEach(dayKey => {
        const dayMov = (movimenti[dayKey] || []).filter(m =>
          movFilterCat === 'Tutti' || m.cat === movFilterCat
        );
        if (dayMov.length === 0) return;
        const dlbl = document.createElement('div'); dlbl.className = 'mov-day-header';
        dlbl.textContent = `${formatDateLabel(dayKey)} (${dayMov.length})`;
        listDiv.appendChild(dlbl);
        dayMov.forEach(m => listDiv.appendChild(buildMovCard(m)));
      });
    }
  }

  container.appendChild(listDiv);

  // Pulsante cancella oggi
  if (movimenti[todayKey()] && movimenti[todayKey()].length > 0) {
    const clrBtn = document.createElement('button');
    clrBtn.className = 'clear-btn';
    clrBtn.textContent = '🗑  Cancella movimenti di oggi';
    clrBtn.onclick = () => { delete movimenti[todayKey()]; saveMov(); renderMovimentiView(); };
    container.appendChild(clrBtn);
  }
}

function buildMovCard(m) {
  const card = document.createElement('div');
  card.className = `mov-card ${m.tipo}`;
  const icon = DATA[m.cat]?.icon || '📦';
  const qtyLabel = m.isToggle
    ? (m.tipo === 'carico' ? '❌' : '✅')
    : (m.tipo === 'carico' ? `−${m.qty}` : `+${m.qty}`);
  card.innerHTML = `
    <div class="mov-icon">${icon}</div>
    <div class="mov-info">
      <div class="mov-name">${m.name}</div>
      <div class="mov-detail">${m.cat} · ${m.tipo === 'carico' ? 'Carico' : 'Scarico'}</div>
    </div>
    <div class="mov-qty ${m.tipo}">${qtyLabel}</div>
    <div class="mov-time">${m.time}</div>
  `;
  return card;
}

let selectedTipo = 'carico';
function selectTipo(tipo) {
  selectedTipo = tipo;
  document.getElementById('btnCarico').className = 'type-btn carico' + (tipo==='carico'?' sel':'');
  document.getElementById('btnScarico').className = 'type-btn scarico' + (tipo==='scarico'?' sel':'');
}

function updateProdSelect() {
  const cat = document.getElementById('movCatSel')?.value;
  const sel = document.getElementById('movProdSel');
  if (!cat || !sel) return;
  const items = getAllItems(cat);
  sel.innerHTML = items.map(i => `<option value="${i.name}">${i.name}</option>`).join('');
}

function submitMovimento() {
  const cat  = document.getElementById('movCatSel').value;
  const name = document.getElementById('movProdSel').value;
  const qty  = parseInt(document.getElementById('movQty').value) || 1;
  const tipo = selectedTipo; // carico(-) scarico(+)

  if (!TOGGLE_ITEMS.has(name)) {
    const item = state[cat][name];
    let current = typeof item.qty === 'number' ? item.qty : 0;
    if (tipo === 'carico') current = Math.max(0, current - qty);
    else current = current + qty;
    state[cat][name].qty = current;
    saveState();
  }

  logMovimento(cat, name, tipo, tipo === 'carico' ? -qty : qty, false);

  if (currentView === 'main') { refreshCard(cat, name); updateAlertBanner(); renderTabs(); }
  showToast(tipo === 'carico' ? `📦 Carico registrato` : `✅ Scarico registrato`);
  renderMovimentiView();
}

// ── Vista Da Ordinare ──────────────────────────────────────────────────────
function showOrdinare() {
  currentView = 'ordinare'; setNav('navOrdinare');
  document.getElementById('tabBar').style.display = 'none';
  const container = document.getElementById('sections'); container.innerHTML = '';
  const sec = document.createElement('div'); sec.className = 'section active';
  const lowItems = [];
  for (const cat of ALL_CATS) {
    const items = getAllItems(cat);
    for (const item of items) {
      if (isLow(cat, item.name)) {
        const st = getItem(cat, item.name);
        lowItems.push({ cat, name: item.name, qty: st.qty, min: st.min });
      }
    }
  }
  if (lowItems.length === 0) {
    sec.innerHTML = '<div class="empty-state"><div class="icon">✅</div>Tutto in ordine!<br>Nessun prodotto sotto scorta.</div>';
  } else {
    const lbl = document.createElement('div'); lbl.className = 'section-label';
    lbl.textContent = `DA ORDINARE (${lowItems.length})`; sec.appendChild(lbl);
    for (const item of lowItems) {
      const card = document.createElement('div'); card.className = 'ordinare-card';
      card.innerHTML = `<div class="ordinare-dot"></div><div class="ordinare-info"><div class="ordinare-name">${item.name}</div><div class="ordinare-detail">${DATA[item.cat].icon} ${item.cat} — qta: ${item.qty ?? '—'} / min: ${item.min ?? '—'}</div></div>`;
      sec.appendChild(card);
    }
  }
  container.appendChild(sec);
}

function showMainView() {
  currentView = 'main'; setNav('navInventario');
  document.getElementById('tabBar').style.display = 'flex';
  renderTabs(); renderSections();
}

function setNav(id) {
  ['navInventario','navMovimenti','navOrdinare'].forEach(n => document.getElementById(n).classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Toast ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Init ──────────────────────────────────────────────────────────────────
selectTipo('carico');
renderAll();
</script>
